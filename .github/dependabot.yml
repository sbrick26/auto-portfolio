version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      all-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # TS 7 breaks the current Next toolchain (PR #91 red CI); lift when Next supports it
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
