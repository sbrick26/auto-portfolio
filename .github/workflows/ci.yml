name: ci

on:
  pull_request:
  push:
    branches: [main]

# superseded runs get cancelled instead of burning minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: npm run test:coverage
      - run: npm run build
